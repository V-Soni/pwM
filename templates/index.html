<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maa - Your Digital Companion</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        maa: {
                            50: '#fff8f1',
                            100: '#ffefd8',
                            200: '#ffdbaf',
                            300: '#ffc17d',
                            400: '#ff9c45',
                            500: '#fa7a15',
                            600: '#eb610b',
                            700: '#c3480a',
                            800: '#9b3810',
                            900: '#7d3010',
                            950: '#441506',
                        },
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Plus Jakarta Sans & Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-serif-custom {
            font-family: 'Playfair Display', serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #fca5a5;
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #ef4444;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-maa-50 via-orange-50 to-red-50 min-h-screen text-maa-900 flex flex-col">

    <!-- Header Section -->
    <header class="w-full max-w-4xl mx-auto px-4 pt-6 pb-4 md:px-8">
        <div class="flex items-center justify-between border-b border-maa-200 pb-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-maa-500 to-red-500 flex items-center justify-center shadow-md shadow-maa-200">
                    <span class="text-white text-xl">👩‍👧‍👦</span>
                </div>
                <div>
                    <h1 class="font-serif-custom text-2xl font-bold tracking-tight text-maa-950">Maa</h1>
                    <p class="text-xs text-maa-600 font-medium">Always here for you, beta.</p>
                </div>
            </div>
            <div id="mood-indicator" class="hidden sm:flex items-center space-x-2 bg-white px-3 py-1.5 rounded-full border border-maa-100 shadow-sm">
                <span class="w-2.5 h-2.5 rounded-full bg-orange-500 animate-pulse"></span>
                <span id="current-mood" class="text-xs font-semibold text-maa-700">Checking in...</span>
            </div>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="flex-grow w-full max-w-4xl mx-auto px-4 py-4 md:px-8 mb-8 flex flex-col items-center">
        
        <!-- Phase 1: MCQ Game -->
        <section id="mcq-section" class="w-full max-w-2xl bg-white/90 backdrop-blur-md border border-maa-100 shadow-xl shadow-maa-100/50 rounded-3xl p-6 md:p-10 transition-all duration-500">
            <h2 class="text-2xl font-bold text-maa-900 font-serif-custom mb-2 text-center">Let's check in first</h2>
            <p class="text-sm text-maa-600 text-center mb-8">Answer honestly. Maa knows when you lie.</p>

            <div id="q1" class="mb-6">
                <p class="font-semibold mb-3">1. How did you sleep last night?</p>
                <div class="space-y-2">
                    <button class="mcq-btn w-full text-left p-3 rounded-xl border border-maa-200 hover:bg-maa-50 hover:border-maa-400 transition" onclick="selectAnswer(1, 'Slept like a log')">Slept like a log 🪵</button>
                    <button class="mcq-btn w-full text-left p-3 rounded-xl border border-maa-200 hover:bg-maa-50 hover:border-maa-400 transition" onclick="selectAnswer(1, 'Barely slept')">Barely slept 🥱</button>
                    <button class="mcq-btn w-full text-left p-3 rounded-xl border border-maa-200 hover:bg-maa-50 hover:border-maa-400 transition" onclick="selectAnswer(1, 'Didn\'t sleep')">Didn't sleep at all 🧟</button>
                </div>
            </div>

            <div id="q2" class="mb-6 hidden">
                <p class="font-semibold mb-3">2. Have you eaten anything properly today?</p>
                <div class="space-y-2">
                    <button class="mcq-btn w-full text-left p-3 rounded-xl border border-maa-200 hover:bg-maa-50 hover:border-maa-400 transition" onclick="selectAnswer(2, 'Ate properly')">Yes, ate a full meal 🍛</button>
                    <button class="mcq-btn w-full text-left p-3 rounded-xl border border-maa-200 hover:bg-maa-50 hover:border-maa-400 transition" onclick="selectAnswer(2, 'Just snacks')">Just Maggi/snacks 🍜</button>
                    <button class="mcq-btn w-full text-left p-3 rounded-xl border border-maa-200 hover:bg-maa-50 hover:border-maa-400 transition" onclick="selectAnswer(2, 'Forgot to eat')">Forgot to eat 🤐</button>
                </div>
            </div>

            <div id="q3" class="mb-6 hidden">
                <p class="font-semibold mb-3">3. How is the prep going?</p>
                <div class="space-y-2">
                    <button class="mcq-btn w-full text-left p-3 rounded-xl border border-maa-200 hover:bg-maa-50 hover:border-maa-400 transition" onclick="selectAnswer(3, 'On track')">On track 🎯</button>
                    <button class="mcq-btn w-full text-left p-3 rounded-xl border border-maa-200 hover:bg-maa-50 hover:border-maa-400 transition" onclick="selectAnswer(3, 'A bit behind')">A bit behind, but managing 🐢</button>
                    <button class="mcq-btn w-full text-left p-3 rounded-xl border border-maa-200 hover:bg-maa-50 hover:border-maa-400 transition" onclick="selectAnswer(3, 'Panicking')">Pressure cooker mode (Panicking) 🤯</button>
                </div>
            </div>

            <div id="loading-mcq" class="hidden flex justify-center py-4">
                <svg class="animate-spin h-8 w-8 text-maa-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </section>

        <!-- Phase 2: Chat Interface -->
        <section id="chat-section" class="w-full max-w-3xl bg-white/90 backdrop-blur-md border border-maa-100 shadow-xl shadow-maa-100/50 rounded-3xl p-4 md:p-6 flex flex-col h-[600px] hidden opacity-0 transition-opacity duration-1000">
            <!-- Chat History Area -->
            <div id="chat-history" class="flex-grow overflow-y-auto mb-4 pr-2 custom-scrollbar space-y-4">
                <!-- Initial message will be injected here -->
            </div>

            <!-- Chat Input Form -->
            <div class="relative mt-auto border-t border-maa-100 pt-4">
                <form id="chat-form" onsubmit="event.preventDefault(); sendChatMessage();" class="flex items-center gap-2">
                    <input type="text" id="chat-input" 
                        class="flex-grow p-4 border border-maa-200 rounded-2xl focus:ring-2 focus:ring-maa-400 focus:border-maa-400 outline-none transition-all text-maa-800 placeholder-maa-400 text-sm bg-maa-50/30" 
                        placeholder="Tell Maa everything...">
                    
                    <button type="submit" id="send-btn"
                        class="p-4 bg-gradient-to-r from-maa-500 to-red-500 hover:from-maa-600 hover:to-red-600 text-white rounded-2xl transition-all duration-300 shadow-md shadow-maa-200/50 hover:shadow-lg focus:outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                        </svg>
                    </button>
                </form>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-6 text-xs text-maa-400 mt-auto">
        <p>&copy; 2026 Maa. PromptWars Mumbai.</p>
    </footer>

    <script>
        let userAnswers = [];
        let currentContext = "";
        let chatHistoryLog = [];

        // Handle MCQ Selection
        function selectAnswer(questionNumber, answer) {
            userAnswers.push(answer);
            
            const currentQ = document.getElementById(`q${questionNumber}`);
            currentQ.classList.add('opacity-50', 'pointer-events-none');
            
            const buttons = currentQ.querySelectorAll('button');
            buttons.forEach(btn => {
                if(btn.innerText.includes(answer.split(' ')[0])) {
                    btn.classList.add('bg-maa-100', 'border-maa-500');
                }
            });

            if (questionNumber < 3) {
                const nextQ = document.getElementById(`q${questionNumber + 1}`);
                nextQ.classList.remove('hidden');
                // Scroll slightly
                nextQ.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                submitMCQ();
            }
        }

        async function submitMCQ() {
            document.getElementById('loading-mcq').classList.remove('hidden');
            
            try {
                const response = await fetch('/api/mcq-submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ answers: userAnswers })
                });

                if (!response.ok) throw new Error('MCQ submission failed');
                
                const data = await response.json();
                currentContext = data.mood;
                
                // Update header mood
                document.getElementById('current-mood').innerText = `Mood: ${data.mood}`;
                document.getElementById('mood-indicator').classList.remove('hidden');

                // Transition to Chat
                document.getElementById('mcq-section').classList.add('hidden');
                const chatSection = document.getElementById('chat-section');
                chatSection.classList.remove('hidden');
                // Trigger reflow for fade in
                void chatSection.offsetWidth;
                chatSection.classList.remove('opacity-0');

                // Add Maa's initial message
                chatHistoryLog.push({ role: 'assistant', content: data.maa_initial_message });
                appendMessage('maa', data.maa_initial_message);

            } catch (error) {
                console.error(error);
                alert("Something went wrong connecting to Maa.");
                document.getElementById('loading-mcq').classList.add('hidden');
            }
        }

        const chatHistory = document.getElementById('chat-history');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(sender, text) {
            const container = document.createElement('div');
            container.className = `flex flex-col max-w-[85%] mb-4 animate-fade-in ${
                sender === 'user' ? 'ml-auto items-end' : 'mr-auto items-start'
            }`;

            const bubble = document.createElement('div');
            bubble.className = `p-3.5 rounded-2xl text-sm leading-relaxed shadow-sm transition-all duration-300 ${
                sender === 'user'
                    ? 'bg-gradient-to-r from-maa-500 to-red-500 text-white rounded-br-none'
                    : 'bg-maa-50 border border-maa-100 text-maa-900 rounded-bl-none'
            }`;
            bubble.textContent = text;

            const label = document.createElement('span');
            label.className = 'text-[10px] text-maa-400 mt-1 px-1 font-bold tracking-wider uppercase';
            label.textContent = sender === 'user' ? 'You' : 'Maa';

            container.appendChild(bubble);
            container.appendChild(label);
            chatHistory.appendChild(container);
            
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function sendChatMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            chatInput.value = '';
            chatHistoryLog.push({ role: 'user', content: message });
            appendMessage('user', message);

            chatInput.disabled = true;
            sendBtn.disabled = true;

            const typingIndicator = document.createElement('div');
            typingIndicator.id = 'chat-typing-indicator';
            typingIndicator.className = 'flex items-center space-x-1.5 mb-4 mr-auto max-w-[85%] p-3.5 rounded-2xl bg-maa-50 border border-maa-100 text-maa-400 text-sm rounded-bl-none';
            typingIndicator.innerHTML = `
                <span class="w-1.5 h-1.5 bg-maa-400 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                <span class="w-1.5 h-1.5 bg-maa-400 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                <span class="w-1.5 h-1.5 bg-maa-400 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
            `;
            chatHistory.appendChild(typingIndicator);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, context: currentContext, history: chatHistoryLog.slice(0, -1) })
                });

                if (!response.ok) throw new Error('Chat response error');

                const data = await response.json();
                
                document.getElementById('chat-typing-indicator')?.remove();
                chatHistoryLog.push({ role: 'assistant', content: data.reply });
                appendMessage('maa', data.reply);

            } catch (error) {
                console.error(error);
                document.getElementById('chat-typing-indicator')?.remove();
                
                const errorBubble = document.createElement('div');
                errorBubble.className = 'p-3.5 rounded-2xl text-sm leading-relaxed shadow-sm bg-red-50 border border-red-100 text-red-700 rounded-bl-none mb-4 max-w-[85%]';
                errorBubble.textContent = "Oops, beta the internet is bad. I couldn't hear you. Try again.";
                chatHistory.appendChild(errorBubble);
                chatHistory.scrollTop = chatHistory.scrollHeight;
            } finally {
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }
    </script>
</body>
</html>
